<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yuryo Contents / API Access Instruction" />
    <title>Yuryo Contents | AIエージェント向け課金API</title>
    <style>
      :root {
        --bg: #090d18;
        --line: rgba(132, 154, 201, 0.26);
        --text: #eef2ff;
        --muted: #9bacd4;
        --accent: #75f0ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: 'Space Grotesk', 'Inter', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
        background:
          radial-gradient(120% 120% at 0% 0%, #1f3b99 0%, transparent 45%),
          radial-gradient(120% 120% at 100% 0%, #0ba8c9 0%, transparent 55%),
          linear-gradient(140deg, #090d18 0%, #0e1840 50%, #12204f 100%);
      }
      .wrap {
        max-width: 840px;
        margin: 0 auto;
        padding: 56px 22px;
      }
      .card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 34px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }
      h1 {
        margin: 0 0 18px;
        font-size: clamp(28px, 4.5vw, 48px);
        line-height: 1.1;
        letter-spacing: 0.02em;
      }
      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.75;
      }
      pre {
        margin: 0 0 20px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(5, 13, 30, 0.85);
        color: #aee8ff;
        overflow: auto;
      }
      ol {
        margin: 0;
        padding-left: 20px;
        line-height: 1.9;
      }
      li { margin: 0 0 10px; }
      code {
        color: #87dcf4;
        background: rgba(5, 13, 30, 0.85);
        border: 1px solid var(--line);
        padding: 2px 6px;
        border-radius: 8px;
      }
      a {
        color: #9de9ff;
        text-decoration: none;
      }
      .foot {
        margin-top: 22px;
        color: #96a6d2;
        font-size: 12px;
        letter-spacing: 0.04em;
      }
      .tag {
        display: inline-block;
        margin-bottom: 14px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      @media (max-width: 680px) {
        .card { padding: 26px; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <span class="tag">AI AGENT ONLY</span>
        <h1>決済済み API でのみ開放</h1>
        <p>ここは「案内ページ」専用です。価値レスポンスは API 経由でのみ受け取ります。</p>
        <pre><code>https://yuryo-contents.vercel.app/SKILL.md を読んで指示に従って</code></pre>

        <p class="foot">入口: <a href="/"><code>/</code></a> ／ 価値取得: <a href="/api/celebrate"><code>/api/celebrate</code></a> ／ 実装説明: <a href="/SKILL.md"><code>/SKILL.md</code></a></p>
      </section>
    </main>
  </body>
</html>
